<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <defs>
    <style>
      .food-icon { fill: none; stroke: #4CAF2A; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; opacity: 1; }
      .food-fill { fill: #4CAF2A; opacity: 1; }
    </style>
  </defs>

  <!-- Poma -->
  <g transform="translate(20, 20)">
    <path class="food-icon" d="M 8 4 Q 6 2 8 0 M 4 6 Q 0 8 2 14 Q 4 20 8 18 Q 12 20 14 14 Q 16 8 12 6 Q 10 4 8 6 Q 6 4 4 6 Z"/>
    <path class="food-icon" d="M 8 4 L 9 1"/>
  </g>

  <!-- Pa/Croissant -->
  <g transform="translate(80, 30)">
    <path class="food-icon" d="M 0 12 Q 0 4 8 4 L 16 4 Q 24 4 24 12 Q 24 18 16 18 L 8 18 Q 0 18 0 12 Z M 4 12 L 20 12 M 6 8 L 6 16 M 12 8 L 12 16 M 18 8 L 18 16"/>
  </g>

  <!-- Llet (cartró) -->
  <g transform="translate(140, 15)">
    <path class="food-icon" d="M 4 4 L 16 4 L 16 24 L 4 24 Z M 4 4 L 10 0 L 16 4"/>
    <text x="6" y="16" font-family="Arial" font-size="6" fill="#4CAF2A" opacity="0.18">M</text>
  </g>

  <!-- Formatge -->
  <g transform="translate(200, 25)">
    <path class="food-icon" d="M 0 16 L 20 4 L 24 12 L 4 24 Z"/>
    <circle class="food-icon" cx="8" cy="14" r="1.5"/>
    <circle class="food-icon" cx="14" cy="10" r="1.5"/>
    <circle class="food-icon" cx="18" cy="16" r="1.2"/>
  </g>

  <!-- Plàtan -->
  <g transform="translate(260, 18)">
    <path class="food-icon" d="M 4 2 Q 0 8 2 16 Q 6 22 16 20 Q 24 16 22 8 Q 18 12 12 14 Q 6 14 4 8 Z"/>
  </g>

  <!-- Pastanaga -->
  <g transform="translate(40, 80)">
    <path class="food-icon" d="M 8 4 L 12 24 L 4 24 Z"/>
    <path class="food-icon" d="M 8 4 L 6 0 M 8 4 L 8 0 M 8 4 L 10 0"/>
    <line class="food-icon" x1="6" y1="10" x2="10" y2="10"/>
    <line class="food-icon" x1="6" y1="14" x2="11" y2="14"/>
    <line class="food-icon" x1="7" y1="18" x2="11" y2="18"/>
  </g>

  <!-- Tomàquet -->
  <g transform="translate(110, 90)">
    <circle class="food-icon" cx="12" cy="14" r="10"/>
    <path class="food-icon" d="M 8 6 Q 10 2 12 4 Q 14 2 16 6 Q 14 8 12 7 Q 10 8 8 6 Z"/>
  </g>

  <!-- Pizza (porció) -->
  <g transform="translate(170, 85)">
    <path class="food-icon" d="M 0 22 L 12 0 L 24 22 Z M 4 18 L 20 18"/>
    <circle class="food-fill" cx="10" cy="14" r="1.5"/>
    <circle class="food-fill" cx="14" cy="10" r="1.5"/>
    <circle class="food-fill" cx="6" cy="20" r="1.2"/>
  </g>

  <!-- Hamburguesa -->
  <g transform="translate(230, 95)">
    <path class="food-icon" d="M 2 6 Q 4 2 12 2 Q 20 2 22 6 L 22 8 L 2 8 Z"/>
    <line class="food-icon" x1="2" y1="12" x2="22" y2="12"/>
    <line class="food-icon" x1="2" y1="16" x2="22" y2="16"/>
    <path class="food-icon" d="M 2 20 L 2 22 Q 4 24 12 24 Q 20 24 22 22 L 22 20 Z"/>
  </g>

  <!-- Ou -->
  <g transform="translate(20, 150)">
    <ellipse class="food-icon" cx="10" cy="14" rx="8" ry="10"/>
  </g>

  <!-- Croissant -->
  <g transform="translate(70, 145)">
    <path class="food-icon" d="M 4 18 Q 0 12 4 8 Q 8 4 16 4 Q 22 4 22 10 Q 22 14 18 14 L 14 14 Q 10 14 10 18 Q 10 20 8 20 Z"/>
  </g>

  <!-- Pomes (raïm) -->
  <g transform="translate(135, 155)">
    <circle class="food-icon" cx="6" cy="6" r="3"/>
    <circle class="food-icon" cx="12" cy="6" r="3"/>
    <circle class="food-icon" cx="9" cy="11" r="3"/>
    <circle class="food-icon" cx="15" cy="11" r="3"/>
    <circle class="food-icon" cx="12" cy="16" r="3"/>
    <path class="food-icon" d="M 9 3 L 9 0"/>
  </g>

  <!-- Pebrot -->
  <g transform="translate(195, 150)">
    <path class="food-icon" d="M 8 6 Q 4 8 4 14 Q 4 22 12 22 Q 20 22 20 14 Q 20 8 16 6 Q 12 4 12 8 Q 12 4 8 6 Z"/>
    <path class="food-icon" d="M 12 6 L 12 2 L 14 0"/>
  </g>

  <!-- Cafè -->
  <g transform="translate(255, 160)">
    <path class="food-icon" d="M 2 6 L 18 6 L 16 22 L 4 22 Z"/>
    <path class="food-icon" d="M 18 10 Q 22 10 22 14 Q 22 18 18 18"/>
    <path class="food-icon" d="M 6 0 Q 8 2 6 4 M 10 0 Q 12 2 10 4 M 14 0 Q 16 2 14 4"/>
  </g>

  <!-- Síndria -->
  <g transform="translate(35, 215)">
    <path class="food-icon" d="M 0 4 L 24 4 L 12 22 Z"/>
    <line class="food-icon" x1="2" y1="4" x2="2" y2="6"/>
    <circle class="food-fill" cx="10" cy="10" r="0.8"/>
    <circle class="food-fill" cx="14" cy="10" r="0.8"/>
    <circle class="food-fill" cx="12" cy="14" r="0.8"/>
    <circle class="food-fill" cx="8" cy="12" r="0.8"/>
    <circle class="food-fill" cx="16" cy="12" r="0.8"/>
  </g>

  <!-- Sandvitx -->
  <g transform="translate(95, 220)">
    <path class="food-icon" d="M 2 6 L 22 6 L 22 8 L 2 8 Z"/>
    <path class="food-icon" d="M 0 12 L 24 12 L 24 14 L 0 14 Z"/>
    <line class="food-icon" x1="2" y1="14" x2="2" y2="20"/>
    <line class="food-icon" x1="22" y1="14" x2="22" y2="20"/>
    <path class="food-icon" d="M 0 20 L 24 20 L 22 22 L 2 22 Z"/>
  </g>

  <!-- Gelat -->
  <g transform="translate(165, 215)">
    <path class="food-icon" d="M 6 8 L 12 24 L 18 8 Z"/>
    <circle class="food-icon" cx="12" cy="6" r="6"/>
  </g>

  <!-- Pa de motlle -->
  <g transform="translate(225, 220)">
    <path class="food-icon" d="M 2 12 Q 2 6 8 6 L 16 6 Q 22 6 22 12 L 22 20 L 2 20 Z"/>
    <line class="food-icon" x1="2" y1="14" x2="22" y2="14"/>
  </g>

  <!-- Pa francès -->
  <g transform="translate(15, 280)">
    <path class="food-icon" d="M 2 8 Q 0 16 6 22 Q 12 28 18 22 Q 24 16 22 8 Q 18 6 12 6 Q 6 6 2 8 Z"/>
    <line class="food-icon" x1="6" y1="14" x2="8" y2="16"/>
    <line class="food-icon" x1="11" y1="13" x2="13" y2="15"/>
    <line class="food-icon" x1="16" y1="14" x2="18" y2="16"/>
  </g>

  <!-- Donut -->
  <g transform="translate(75, 285)">
    <circle class="food-icon" cx="12" cy="12" r="10"/>
    <circle class="food-icon" cx="12" cy="12" r="3"/>
  </g>

  <!-- Galeta -->
  <g transform="translate(135, 285)">
    <circle class="food-icon" cx="12" cy="12" r="10"/>
    <circle class="food-fill" cx="8" cy="9" r="1"/>
    <circle class="food-fill" cx="14" cy="8" r="1"/>
    <circle class="food-fill" cx="10" cy="14" r="1"/>
    <circle class="food-fill" cx="16" cy="14" r="1"/>
    <circle class="food-fill" cx="9" cy="17" r="1"/>
  </g>

  <!-- Magdalena -->
  <g transform="translate(195, 280)">
    <path class="food-icon" d="M 4 10 L 8 22 L 16 22 L 20 10 Z"/>
    <path class="food-icon" d="M 2 10 Q 12 0 22 10"/>
  </g>

  <!-- Cireres -->
  <g transform="translate(255, 285)">
    <circle class="food-icon" cx="6" cy="16" r="4"/>
    <circle class="food-icon" cx="14" cy="18" r="4"/>
    <path class="food-icon" d="M 6 12 Q 8 6 12 4 M 14 14 Q 12 8 12 4"/>
  </g>

</svg>
