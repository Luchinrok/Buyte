<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#639922">
  <title>EatMeFirst</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- PANTALLA PRINCIPAL: SELECTOR DE SECCIONS -->
  <div id="screen-home" class="screen active">
    <header class="top-bar">
      <div class="top-info">
        <h1>EatMeFirst</h1>
        <p id="top-summary">...</p>
      </div>
      <button id="menu-btn" class="icon-btn" aria-label="Menú">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="4" y1="7" x2="20" y2="7"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="17" x2="20" y2="17"></line>
        </svg>
      </button>
    </header>

    <div class="sections-grid">
      <button class="section-btn section-fridge" data-cat="fridge">
        <div class="section-icon">
          <!-- Nevera SVG -->
          <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <rect x="15" y="8" width="70" height="114" rx="8" fill="#E8F4FD" stroke="#2C5F8B" stroke-width="3"/>
            <line x1="15" y1="48" x2="85" y2="48" stroke="#2C5F8B" stroke-width="2.5"/>
            <rect x="22" y="20" width="56" height="20" rx="3" fill="#FFFFFF" stroke="#5A8AB5" stroke-width="1"/>
            <rect x="22" y="58" width="56" height="22" rx="3" fill="#FFFFFF" stroke="#5A8AB5" stroke-width="1"/>
            <rect x="22" y="86" width="56" height="22" rx="3" fill="#FFFFFF" stroke="#5A8AB5" stroke-width="1"/>
            <rect x="78" y="28" width="3" height="14" rx="1.5" fill="#2C5F8B"/>
            <rect x="78" y="68" width="3" height="46" rx="1.5" fill="#2C5F8B"/>
            <circle cx="29" cy="29" r="2" fill="#FF6B6B"/>
          </svg>
        </div>
        <div class="section-info">
          <p class="section-title" data-i18n="catFridge"></p>
          <p class="section-count" id="count-fridge">0</p>
        </div>
        <div class="section-badge" id="badge-fridge"></div>
      </button>

      <button class="section-btn section-freezer" data-cat="freezer">
        <div class="section-icon">
          <!-- Congelador SVG -->
          <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <rect x="15" y="8" width="70" height="114" rx="8" fill="#D6EAF8" stroke="#1A5490" stroke-width="3"/>
            <line x1="15" y1="65" x2="85" y2="65" stroke="#1A5490" stroke-width="2.5"/>
            <rect x="78" y="38" width="3" height="20" rx="1.5" fill="#1A5490"/>
            <rect x="78" y="78" width="3" height="36" rx="1.5" fill="#1A5490"/>
            <!-- Floquets de neu -->
            <g fill="#5DADE2" opacity="0.8">
              <path d="M 35 30 L 35 40 M 31 35 L 39 35 M 32 32 L 38 38 M 38 32 L 32 38" stroke="#5DADE2" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M 65 30 L 65 40 M 61 35 L 69 35 M 62 32 L 68 38 M 68 32 L 62 38" stroke="#5DADE2" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M 50 90 L 50 102 M 44 96 L 56 96 M 45 92 L 55 100 M 55 92 L 45 100" stroke="#5DADE2" stroke-width="1.5" stroke-linecap="round"/>
            </g>
            <rect x="22" y="76" width="56" height="22" rx="3" fill="#FFFFFF" stroke="#5DADE2" stroke-width="1"/>
            <rect x="22" y="103" width="56" height="14" rx="3" fill="#FFFFFF" stroke="#5DADE2" stroke-width="1"/>
          </svg>
        </div>
        <div class="section-info">
          <p class="section-title" data-i18n="catFreezer"></p>
          <p class="section-count" id="count-freezer">0</p>
        </div>
        <div class="section-badge" id="badge-freezer"></div>
      </button>

      <button class="section-btn section-pantry" data-cat="pantry">
        <div class="section-icon">
          <!-- Rebost SVG -->
          <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <rect x="12" y="8" width="76" height="114" rx="4" fill="#F5DEB3" stroke="#8B6F47" stroke-width="3"/>
            <line x1="12" y1="42" x2="88" y2="42" stroke="#8B6F47" stroke-width="2"/>
            <line x1="12" y1="76" x2="88" y2="76" stroke="#8B6F47" stroke-width="2"/>
            <!-- Llaunes/pots al primer prestatge -->
            <rect x="20" y="18" width="10" height="22" rx="1" fill="#E74C3C"/>
            <rect x="34" y="20" width="9" height="20" rx="1" fill="#27AE60"/>
            <rect x="47" y="16" width="11" height="24" rx="1" fill="#F39C12"/>
            <rect x="62" y="20" width="9" height="20" rx="1" fill="#3498DB"/>
            <rect x="75" y="22" width="9" height="18" rx="1" fill="#9B59B6"/>
            <!-- Segon prestatge -->
            <rect x="20" y="50" width="14" height="22" rx="2" fill="#D35400"/>
            <rect x="38" y="52" width="12" height="20" rx="1" fill="#16A085"/>
            <rect x="54" y="48" width="14" height="24" rx="1" fill="#C0392B"/>
            <rect x="72" y="54" width="12" height="18" rx="1" fill="#F1C40F"/>
            <!-- Tercer prestatge -->
            <rect x="20" y="84" width="20" height="30" rx="2" fill="#7B6044"/>
            <rect x="44" y="88" width="14" height="26" rx="1" fill="#A0522D"/>
            <rect x="62" y="86" width="22" height="28" rx="2" fill="#5D4037"/>
          </svg>
        </div>
        <div class="section-info">
          <p class="section-title" data-i18n="catPantry"></p>
          <p class="section-count" id="count-pantry">0</p>
        </div>
        <div class="section-badge" id="badge-pantry"></div>
      </button>

      <button class="section-btn section-alerts" data-cat="alerts">
        <div class="section-icon section-icon-alert">
          <!-- Campana alerta SVG -->
          <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <path d="M 50 25 C 32 25 24 38 24 60 L 24 75 L 18 88 L 82 88 L 76 75 L 76 60 C 76 38 68 25 50 25 Z" fill="#FFB74D" stroke="#E65100" stroke-width="3" stroke-linejoin="round"/>
            <rect x="44" y="15" width="12" height="12" rx="3" fill="#E65100"/>
            <path d="M 42 95 C 42 100 46 105 50 105 C 54 105 58 100 58 95 Z" fill="#E65100"/>
            <!-- Ones d'alerta -->
            <path d="M 12 50 Q 6 60 12 70" stroke="#E65100" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M 88 50 Q 94 60 88 70" stroke="#E65100" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M 6 45 Q -2 60 6 75" stroke="#FFB74D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
            <path d="M 94 45 Q 102 60 94 75" stroke="#FFB74D" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
          </svg>
        </div>
        <div class="section-info">
          <p class="section-title" data-i18n="catAlerts"></p>
          <p class="section-count" id="count-alerts">0</p>
        </div>
        <div class="section-badge" id="badge-alerts"></div>
      </button>
    </div>

    <button id="add-btn" class="primary-btn" data-i18n="addProduct"></button>
  </div>

  <!-- PANTALLA NEVERA / CONGELADOR / REBOST (vista amb 4 prestatges) -->
  <div id="screen-section" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="home" aria-label="Back">‹</button>
      <h1 id="section-title">-</h1>
      <div class="section-nav">
        <button class="section-nav-btn" id="section-prev" aria-label="Prev">‹</button>
        <button class="section-nav-btn" id="section-next" aria-label="Next">›</button>
      </div>
    </header>

    <!-- Indicador de pàgines (3 punts) -->
    <div class="section-dots" id="section-dots"></div>

    <div class="fridge" id="section-fridge">
      <div class="shelf shelf-green" data-level="green">
        <div class="shelf-text">
          <p class="shelf-title" data-i18n="shelfGreen"></p>
          <p class="shelf-sub" id="shelf-sub-green"></p>
        </div>
        <div class="shelf-count">
          <span id="count-green">0</span>
          <span class="shelf-arrow">›</span>
        </div>
      </div>

      <div class="shelf shelf-yellow" data-level="yellow">
        <div class="shelf-text">
          <p class="shelf-title" data-i18n="shelfYellow"></p>
          <p class="shelf-sub" id="shelf-sub-yellow"></p>
        </div>
        <div class="shelf-count">
          <span id="count-yellow">0</span>
          <span class="shelf-arrow">›</span>
        </div>
      </div>

      <div class="shelf shelf-orange" data-level="orange">
        <div class="shelf-text">
          <p class="shelf-title" data-i18n="shelfOrange"></p>
          <p class="shelf-sub" id="shelf-sub-orange"></p>
        </div>
        <div class="shelf-count">
          <span id="count-orange">0</span>
          <span class="shelf-arrow">›</span>
        </div>
      </div>

      <div class="shelf shelf-red" data-level="red">
        <div class="shelf-text">
          <p class="shelf-title" data-i18n="shelfRed"></p>
          <p class="shelf-sub" id="shelf-sub-red"></p>
        </div>
        <div class="shelf-count">
          <span id="count-red">0</span>
          <span class="shelf-arrow">›</span>
        </div>
      </div>
    </div>
  </div>

  <!-- PANTALLA D'ALERTES -->
  <div id="screen-alerts" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="home" aria-label="Back">‹</button>
      <h1 data-i18n="catAlerts"></h1>
      <div style="width:40px"></div>
    </header>

    <p id="alerts-summary" class="section-hint"></p>

    <div id="alerts-list" class="product-list"></div>

    <div id="alerts-empty" class="empty-state" style="display:none">
      <p style="font-size:48px;margin-bottom:10px">🎉</p>
      <p data-i18n="alertsEmpty"></p>
    </div>
  </div>

  <!-- PANTALLA LLISTA DE PRODUCTES -->
  <div id="screen-list" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="section" aria-label="Back">‹</button>
      <h1 id="list-title">-</h1>
      <div style="width:40px"></div>
    </header>

    <div class="nevi-container">
      <svg class="nevi" viewBox="0 0 70 80" xmlns="http://www.w3.org/2000/svg">
        <rect id="nevi-body" x="10" y="5" width="50" height="70" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="2.5"/>
        <line id="nevi-divider" x1="10" y1="30" x2="60" y2="30" stroke="#639922" stroke-width="2.5"/>
        <circle id="nevi-eye-left" cx="25" cy="45" r="3" fill="#173404"/>
        <circle id="nevi-eye-right" cx="45" cy="45" r="3" fill="#173404"/>
        <path id="nevi-mouth" d="M 25 56 Q 35 68 45 56" stroke="#173404" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      <p id="nevi-message"></p>
    </div>

    <div id="product-list" class="product-list"></div>
    <div id="empty-list" class="empty-state" style="display:none" data-i18n="empty"></div>
  </div>

  <!-- PANTALLA DETALL DE PRODUCTE -->
  <div id="screen-product" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="list" aria-label="Back">‹</button>
      <h1 data-i18n="product"></h1>
      <div style="width:40px"></div>
    </header>

    <div class="product-card">
      <p id="product-emoji" class="product-emoji">🥛</p>
      <p id="product-name" class="product-name">-</p>
      <p id="product-days" class="product-days">-</p>
    </div>

    <p class="section-label" data-i18n="whatToDo"></p>

    <div class="actions">
      <button class="action-btn action-consumed" data-action="consumed">
        <span class="action-icon">✓</span>
        <span data-i18n="consumed"></span>
      </button>
      <button class="action-btn action-trashed" data-action="trashed">
        <span class="action-icon">🗑</span>
        <span data-i18n="trashed"></span>
      </button>
      <button class="action-btn action-delete" data-action="deleted">
        <span class="action-icon">✕</span>
        <span data-i18n="deleteError"></span>
      </button>
    </div>
  </div>

  <!-- PANTALLA TRIAR COM AFEGIR -->
  <div id="screen-add-choice" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="home" aria-label="Back">‹</button>
      <h1 data-i18n="addProductTitle"></h1>
      <div style="width:40px"></div>
    </header>

    <div class="add-choices">
      <button class="big-choice" id="choice-scan">
        <span class="big-choice-emoji">📷</span>
        <span class="big-choice-text" data-i18n="scanBarcode"></span>
      </button>
      <button class="big-choice" id="choice-manual">
        <span class="big-choice-emoji">✍️</span>
        <span class="big-choice-text" data-i18n="manual"></span>
      </button>
    </div>
  </div>

  <!-- PANTALLA ESCÀNER -->
  <div id="screen-scan" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="add-choice" aria-label="Back">‹</button>
      <h1 data-i18n="scanning"></h1>
      <div style="width:40px"></div>
    </header>

    <div class="scanner-container">
      <div class="scanner-frame">
        <div id="scanner-video-container"></div>
      </div>
      <p class="scanner-hint" data-i18n="pointCamera"></p>
      <p id="scanner-status" class="scanner-status"></p>

      <div class="scanner-fallbacks">
        <button id="manual-code-btn" class="fallback-btn">
          <span class="fallback-emoji">⌨️</span>
          <span data-i18n="manualCode"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- PANTALLA INTRODUIR CODI A MÀ -->
  <div id="screen-manual-code" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="scan" aria-label="Back">‹</button>
      <h1 data-i18n="manualCode"></h1>
      <div style="width:40px"></div>
    </header>

    <p class="section-hint" data-i18n="manualCodeHint"></p>

    <div class="form-group">
      <label data-i18n="barcodeLabel" for="input-barcode"></label>
      <input type="text" id="input-barcode" inputmode="numeric" pattern="[0-9]*" maxlength="14" placeholder="8410014006288" autocomplete="off">
    </div>

    <button id="search-barcode-btn" class="primary-btn" data-i18n="searchProduct"></button>
  </div>

  <!-- PANTALLA AFEGIR PRODUCTE (manual o després d'escanejar) -->
  <div id="screen-add" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="add-choice" aria-label="Back">‹</button>
      <h1 data-i18n="addProductTitle"></h1>
      <div style="width:40px"></div>
    </header>

    <div id="scan-warning" class="scan-warning" style="display:none">
      <span class="scan-warning-icon">⚠️</span>
      <span data-i18n="scanWarning"></span>
    </div>

    <button id="popular-btn" class="popular-btn">
      <span style="font-size:22px">⭐</span>
      <span data-i18n="popularProducts"></span>
    </button>

    <div class="form-group">
      <label data-i18n="productName" for="input-name"></label>
      <input type="text" id="input-name" autocomplete="off">
    </div>

    <div class="form-group">
      <label data-i18n="location"></label>
      <div class="location-picker" id="location-picker"></div>
    </div>

    <div class="form-group">
      <label data-i18n="emoji"></label>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>

    <div class="form-group">
      <label data-i18n="expiryDate" for="input-date"></label>
      <input type="date" id="input-date">
      <div class="quick-dates">
        <button class="quick-date" data-days="3">+3</button>
        <button class="quick-date" data-days="7">+7</button>
        <button class="quick-date" data-days="14">+14</button>
        <button class="quick-date" data-days="30">+30</button>
      </div>
    </div>

    <button id="save-btn" class="primary-btn" data-i18n="save"></button>
  </div>

  <!-- PANTALLA UBICACIONS (gestió) -->
  <div id="screen-locations" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="add" aria-label="Back">‹</button>
      <h1 data-i18n="locations"></h1>
      <div style="width:40px"></div>
    </header>
    <p class="section-hint" data-i18n="locationsHint"></p>
    <div id="locations-list" class="locations-list"></div>
    <button id="new-location-btn" class="primary-btn" data-i18n="newLocation"></button>
  </div>

  <!-- PANTALLA EDITAR UBICACIÓ -->
  <div id="screen-location-edit" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="locations" aria-label="Back">‹</button>
      <h1 id="loc-edit-title" data-i18n="editLocation"></h1>
      <div style="width:40px"></div>
    </header>

    <div style="text-align:center;font-size:64px;line-height:1;margin:10px 0 20px">
      <span id="loc-edit-emoji">📍</span>
    </div>

    <div class="form-group">
      <label data-i18n="locationName" for="loc-edit-name"></label>
      <input type="text" id="loc-edit-name" autocomplete="off">
    </div>

    <div class="form-group">
      <label data-i18n="emoji"></label>
      <div class="emoji-picker" id="loc-edit-emoji-picker"></div>
    </div>

    <div class="form-group">
      <label data-i18n="storageType"></label>
      <div class="storage-type-picker" id="storage-type-picker"></div>
      <p class="form-hint" data-i18n="storageTypeHint"></p>
    </div>

    <button id="save-location-btn" class="primary-btn" data-i18n="save"></button>
    <button id="loc-edit-delete" class="danger-btn" data-i18n="delete" style="display:none;margin-top:10px"></button>
  </div>

  <!-- PANTALLA PRODUCTES POPULARS -->
  <div id="screen-popular" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="add" aria-label="Back">‹</button>
      <h1 data-i18n="popularProducts"></h1>
      <div style="width:40px"></div>
    </header>
    <p class="section-hint" data-i18n="popularHint"></p>
    <div id="popular-list" class="popular-list"></div>
  </div>

  <!-- PANTALLA CONFIGURACIÓ -->
  <div id="screen-settings" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="home" aria-label="Back">‹</button>
      <h1 data-i18n="menu"></h1>
      <div style="width:40px"></div>
    </header>

    <div class="settings-list">
      <div class="settings-item">
        <div>
          <p class="settings-title" data-i18n="notifications"></p>
          <p class="settings-sub" data-i18n="comingSoon"></p>
        </div>
      </div>
      <div class="settings-item" id="settings-language">
        <div>
          <p class="settings-title" data-i18n="language"></p>
          <p class="settings-sub" id="language-status">-</p>
        </div>
      </div>
      <div class="settings-item" id="settings-theme">
        <div>
          <p class="settings-title" data-i18n="appearance"></p>
          <p class="settings-sub" id="theme-status">-</p>
        </div>
      </div>
      <div class="settings-item" id="settings-stats">
        <div>
          <p class="settings-title" data-i18n="stats"></p>
          <p class="settings-sub" id="stats-sub" data-i18n="statsEmpty"></p>
        </div>
      </div>
      <div class="settings-item settings-danger" id="settings-reset">
        <div>
          <p class="settings-title danger-text" data-i18n="resetAll"></p>
          <p class="settings-sub" data-i18n="resetSub"></p>
        </div>
      </div>
    </div>

    <p class="app-version">EatMeFirst · v2.0</p>
  </div>

  <!-- PANTALLA IDIOMES -->
  <div id="screen-language" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="settings" aria-label="Back">‹</button>
      <h1 data-i18n="language"></h1>
      <div style="width:40px"></div>
    </header>

    <div class="lang-list" id="lang-list"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
