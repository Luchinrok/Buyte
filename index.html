<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#639922">
  <title>EatMeFirst</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- PANTALLA PRINCIPAL: SELECTOR DE SECCIONS -->
  <div id="screen-home" class="screen active">
    <header class="top-bar">
      <div class="top-info">
        <h1>EatMeFirst</h1>
        <p id="top-summary">...</p>
      </div>
      <button id="menu-btn" class="icon-btn icon-btn-fun" aria-label="Menú">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <!-- Plat amb coberts (configuració de menjar) -->
          <circle cx="16" cy="16" r="13" fill="none" stroke="currentColor" stroke-width="2"/>
          <circle cx="16" cy="16" r="9" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
          <!-- Forquilla -->
          <line x1="10" y1="10" x2="10" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="8" y1="10" x2="8" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12" y1="10" x2="12" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <!-- Cullera -->
          <ellipse cx="22" cy="12" rx="2.5" ry="3" fill="currentColor"/>
          <line x1="22" y1="14" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <div class="sections-grid">
      <button class="section-btn section-fridge" data-cat="fridge">
        <div class="section-icon">
          <!-- NEVERA: blau cel alegre amb productes frescos visibles -->
          <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <!-- Cos principal -->
            <rect x="14" y="6" width="72" height="118" rx="10" fill="#FFFFFF" stroke="#1976D2" stroke-width="3"/>
            <!-- Línia de separació -->
            <line x1="14" y1="44" x2="86" y2="44" stroke="#1976D2" stroke-width="2.5"/>
            <!-- Tirador superior -->
            <rect x="78" y="22" width="4" height="14" rx="2" fill="#1976D2"/>
            <!-- Tirador inferior -->
            <rect x="78" y="60" width="4" height="50" rx="2" fill="#1976D2"/>
            <!-- Llumeta verda (signe que funciona) -->
            <circle cx="22" cy="14" r="2.5" fill="#4CAF50">
              <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
            </circle>
            <!-- CONGELADOR DE DALT -->
            <rect x="22" y="20" width="50" height="18" rx="3" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
            <!-- Productes a la nevera (sota) -->
            <!-- Llet -->
            <rect x="22" y="52" width="14" height="18" rx="2" fill="#FFF" stroke="#1976D2" stroke-width="1"/>
            <rect x="24" y="56" width="10" height="3" fill="#1976D2"/>
            <!-- Iogurts -->
            <rect x="40" y="58" width="9" height="12" rx="1" fill="#FFB74D"/>
            <rect x="51" y="58" width="9" height="12" rx="1" fill="#F06292"/>
            <!-- Pomes -->
            <circle cx="68" cy="62" r="6" fill="#E53935"/>
            <path d="M 68 56 Q 70 53 72 56" stroke="#388E3C" stroke-width="1.5" fill="none"/>
            <!-- Verdures (sota tot) -->
            <rect x="22" y="80" width="48" height="14" rx="3" fill="#A5D6A7" stroke="#66BB6A" stroke-width="1"/>
            <circle cx="32" cy="87" r="3" fill="#43A047"/>
            <circle cx="42" cy="87" r="3" fill="#FF7043"/>
            <circle cx="52" cy="87" r="3" fill="#43A047"/>
            <circle cx="62" cy="87" r="3" fill="#FF7043"/>
            <!-- Calaixet inferior -->
            <rect x="22" y="100" width="48" height="14" rx="3" fill="#E1F5FE" stroke="#4FC3F7" stroke-width="1"/>
          </svg>
        </div>
        <div class="section-info">
          <p class="section-title" data-i18n="catFridge"></p>
          <p class="section-count" id="count-fridge">0</p>
        </div>
        <div class="section-badge" id="badge-fridge"></div>
      </button>

      <button class="section-btn section-freezer" data-cat="freezer">
        <div class="section-icon">
          <!-- CONGELADOR: turquesa gelat amb gel cobrint la porta -->
          <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <!-- Cos principal -->
            <rect x="14" y="6" width="72" height="118" rx="10" fill="#B3E5FC" stroke="#0277BD" stroke-width="3"/>
            <!-- Tapa de dalt (congelador horitzontal) -->
            <rect x="14" y="6" width="72" height="44" rx="10" fill="#81D4FA" stroke="#0277BD" stroke-width="3"/>
            <!-- Línia de separació de la tapa -->
            <line x1="14" y1="50" x2="86" y2="50" stroke="#0277BD" stroke-width="2.5"/>
            <!-- Nansa horitzontal -->
            <rect x="35" y="26" width="30" height="4" rx="2" fill="#01579B"/>
            <!-- Floquets de neu grans (decoratius) -->
            <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none">
              <!-- Floc 1 (gros, central) -->
              <g transform="translate(30 28)">
                <line x1="-7" y1="0" x2="7" y2="0"/>
                <line x1="0" y1="-7" x2="0" y2="7"/>
                <line x1="-5" y1="-5" x2="5" y2="5"/>
                <line x1="-5" y1="5" x2="5" y2="-5"/>
              </g>
              <!-- Floc 2 -->
              <g transform="translate(70 28)">
                <line x1="-7" y1="0" x2="7" y2="0"/>
                <line x1="0" y1="-7" x2="0" y2="7"/>
                <line x1="-5" y1="-5" x2="5" y2="5"/>
                <line x1="-5" y1="5" x2="5" y2="-5"/>
              </g>
            </g>
            <!-- Cristalls de gel (a la part baixa, dins) -->
            <g fill="#FFFFFF" opacity="0.7">
              <polygon points="22,60 26,68 30,60 26,52" />
              <polygon points="40,80 44,90 48,80 44,70" />
              <polygon points="58,72 62,80 66,72 62,64" />
              <polygon points="74,90 78,98 82,90 78,82" />
            </g>
            <!-- Glaçons al fons -->
            <rect x="22" y="100" width="14" height="14" rx="2" fill="#FFFFFF" opacity="0.9" stroke="#0288D1" stroke-width="0.5"/>
            <rect x="40" y="100" width="14" height="14" rx="2" fill="#FFFFFF" opacity="0.9" stroke="#0288D1" stroke-width="0.5"/>
            <rect x="58" y="100" width="14" height="14" rx="2" fill="#FFFFFF" opacity="0.9" stroke="#0288D1" stroke-width="0.5"/>
            <!-- Pampolons de neu de fons (subtils) -->
            <text x="20" y="118" font-size="6" fill="#FFFFFF" opacity="0.6">❄</text>
            <text x="80" y="118" font-size="6" fill="#FFFFFF" opacity="0.6">❄</text>
          </svg>
        </div>
        <div class="section-info">
          <p class="section-title" data-i18n="catFreezer"></p>
          <p class="section-count" id="count-freezer">0</p>
        </div>
        <div class="section-badge" id="badge-freezer"></div>
      </button>

      <button class="section-btn section-pantry" data-cat="pantry">
        <div class="section-icon">
          <!-- REBOST: armari de fusta càlid amb conserves variades -->
          <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <!-- Marc de l'armari (fusta fosca) -->
            <rect x="8" y="6" width="84" height="118" rx="4" fill="#5D4037" stroke="#3E2723" stroke-width="2"/>
            <!-- Interior (fusta clara) -->
            <rect x="14" y="12" width="72" height="106" rx="2" fill="#D7A86E" stroke="#8D6E63" stroke-width="1"/>
            <!-- Línies dels prestatges (fusta) -->
            <rect x="14" y="42" width="72" height="3" fill="#8D6E63"/>
            <rect x="14" y="74" width="72" height="3" fill="#8D6E63"/>
            <rect x="14" y="105" width="72" height="3" fill="#8D6E63"/>
            
            <!-- PRESTATGE 1: Llaunes i pots petits -->
            <rect x="18" y="22" width="10" height="20" rx="1" fill="#E53935"/>
            <rect x="19" y="24" width="8" height="3" fill="#FFFFFF"/>
            <rect x="30" y="24" width="9" height="18" rx="1" fill="#43A047"/>
            <rect x="31" y="26" width="7" height="2" fill="#FFFFFF"/>
            <rect x="41" y="20" width="11" height="22" rx="1" fill="#FB8C00"/>
            <rect x="42" y="22" width="9" height="3" fill="#FFFFFF"/>
            <rect x="54" y="24" width="9" height="18" rx="1" fill="#1E88E5"/>
            <rect x="55" y="26" width="7" height="2" fill="#FFFFFF"/>
            <rect x="65" y="22" width="10" height="20" rx="1" fill="#8E24AA"/>
            <rect x="66" y="24" width="8" height="3" fill="#FFFFFF"/>
            <rect x="77" y="24" width="8" height="18" rx="1" fill="#FDD835"/>
            
            <!-- PRESTATGE 2: Pots de conserva més grans -->
            <rect x="18" y="50" width="14" height="22" rx="2" fill="#FFFFFF" stroke="#666" stroke-width="0.5"/>
            <rect x="19" y="52" width="12" height="6" fill="#A1887F"/>
            <rect x="35" y="52" width="12" height="20" rx="1" fill="#26A69A"/>
            <rect x="36" y="54" width="10" height="3" fill="#FFFFFF"/>
            <rect x="50" y="48" width="14" height="24" rx="2" fill="#FFFFFF" stroke="#666" stroke-width="0.5"/>
            <rect x="51" y="50" width="12" height="6" fill="#FFB74D"/>
            <rect x="67" y="52" width="12" height="20" rx="1" fill="#EF5350"/>
            <rect x="68" y="54" width="10" height="3" fill="#FFFFFF"/>
            
            <!-- PRESTATGE 3: Capses de cereals/pasta -->
            <rect x="18" y="80" width="20" height="24" rx="2" fill="#FF9800"/>
            <rect x="20" y="83" width="16" height="3" fill="#FFFFFF"/>
            <rect x="22" y="89" width="12" height="2" fill="#FFFFFF" opacity="0.7"/>
            <rect x="40" y="84" width="16" height="20" rx="1" fill="#7B1FA2"/>
            <rect x="42" y="87" width="12" height="3" fill="#FFFFFF"/>
            <rect x="58" y="80" width="22" height="24" rx="2" fill="#5D4037"/>
            <rect x="60" y="83" width="18" height="3" fill="#FFCC80"/>
            <rect x="62" y="89" width="14" height="2" fill="#FFCC80" opacity="0.7"/>
            
            <!-- Pomos -->
            <circle cx="83" cy="64" r="2" fill="#FFC107"/>
            <circle cx="83" cy="95" r="2" fill="#FFC107"/>
          </svg>
        </div>
        <div class="section-info">
          <p class="section-title" data-i18n="catPantry"></p>
          <p class="section-count" id="count-pantry">0</p>
        </div>
        <div class="section-badge" id="badge-pantry"></div>
      </button>

      <button class="section-btn section-alerts" data-cat="alerts">
        <div class="section-icon section-icon-alert">
          <!-- ALERTES: campana vermella cridanera amb ones d'avís -->
          <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <!-- Ones d'alarma (de fons, animades) -->
            <g stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5">
              <path d="M 8 50 Q 0 65 8 80">
                <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.5s" repeatCount="indefinite"/>
              </path>
              <path d="M 92 50 Q 100 65 92 80">
                <animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.5s" repeatCount="indefinite"/>
              </path>
              <path d="M 4 40 Q -4 65 4 90">
                <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2s" repeatCount="indefinite"/>
              </path>
              <path d="M 96 40 Q 104 65 96 90">
                <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2s" repeatCount="indefinite"/>
              </path>
            </g>
            <!-- Botó al damunt de la campana -->
            <rect x="44" y="14" width="12" height="10" rx="2" fill="#FFEB3B" stroke="#F57F17" stroke-width="1.5"/>
            <!-- Cos de la campana (gran i visible) -->
            <path d="M 50 22 C 28 22 22 38 22 64 L 22 82 L 14 95 L 86 95 L 78 82 L 78 64 C 78 38 72 22 50 22 Z" fill="#FFEB3B" stroke="#F57F17" stroke-width="3" stroke-linejoin="round"/>
            <!-- Brillantor de la campana -->
            <ellipse cx="35" cy="42" rx="4" ry="10" fill="#FFFFFF" opacity="0.5"/>
            <!-- Símbol d'exclamació al centre -->
            <rect x="46" y="44" width="8" height="22" rx="2" fill="#D32F2F"/>
            <circle cx="50" cy="74" r="4" fill="#D32F2F"/>
            <!-- Batall (la pilota de baix) -->
            <path d="M 42 100 C 42 108 48 112 50 112 C 52 112 58 108 58 100 Z" fill="#F57F17" stroke="#D32F2F" stroke-width="2"/>
          </svg>
        </div>
        <div class="section-info">
          <p class="section-title" data-i18n="catAlerts"></p>
          <p class="section-count" id="count-alerts">0</p>
        </div>
        <div class="section-badge" id="badge-alerts"></div>
      </button>
    </div>

    <button id="add-btn" class="primary-btn" data-i18n="addProduct"></button>
  </div>

  <!-- PANTALLA NEVERA / CONGELADOR / REBOST (vista amb 4 prestatges) -->
  <div id="screen-section" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="home" aria-label="Back">‹</button>
      <h1 id="section-title">-</h1>
      <div class="section-nav">
        <button class="section-nav-btn" id="section-prev" aria-label="Prev">‹</button>
        <button class="section-nav-btn" id="section-next" aria-label="Next">›</button>
      </div>
    </header>

    <!-- Indicador de pàgines (3 punts) -->
    <div class="section-dots" id="section-dots"></div>

    <div class="fridge" id="section-fridge">
      <div class="shelf shelf-green" data-level="green">
        <div class="shelf-text">
          <p class="shelf-title" data-i18n="shelfGreen"></p>
          <p class="shelf-sub" id="shelf-sub-green"></p>
        </div>
        <div class="shelf-count">
          <span id="count-green">0</span>
          <span class="shelf-arrow">›</span>
        </div>
      </div>

      <div class="shelf shelf-yellow" data-level="yellow">
        <div class="shelf-text">
          <p class="shelf-title" data-i18n="shelfYellow"></p>
          <p class="shelf-sub" id="shelf-sub-yellow"></p>
        </div>
        <div class="shelf-count">
          <span id="count-yellow">0</span>
          <span class="shelf-arrow">›</span>
        </div>
      </div>

      <div class="shelf shelf-orange" data-level="orange">
        <div class="shelf-text">
          <p class="shelf-title" data-i18n="shelfOrange"></p>
          <p class="shelf-sub" id="shelf-sub-orange"></p>
        </div>
        <div class="shelf-count">
          <span id="count-orange">0</span>
          <span class="shelf-arrow">›</span>
        </div>
      </div>

      <div class="shelf shelf-red" data-level="red">
        <div class="shelf-text">
          <p class="shelf-title" data-i18n="shelfRed"></p>
          <p class="shelf-sub" id="shelf-sub-red"></p>
        </div>
        <div class="shelf-count">
          <span id="count-red">0</span>
          <span class="shelf-arrow">›</span>
        </div>
      </div>
    </div>
  </div>

  <!-- PANTALLA D'ALERTES -->
  <div id="screen-alerts" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="home" aria-label="Back">‹</button>
      <h1 data-i18n="catAlerts"></h1>
      <div style="width:40px"></div>
    </header>

    <p id="alerts-summary" class="section-hint"></p>

    <div id="alerts-list" class="product-list"></div>

    <div id="alerts-empty" class="empty-state" style="display:none">
      <p style="font-size:48px;margin-bottom:10px">🎉</p>
      <p data-i18n="alertsEmpty"></p>
    </div>
  </div>

  <!-- PANTALLA LLISTA DE PRODUCTES -->
  <div id="screen-list" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="section" aria-label="Back">‹</button>
      <h1 id="list-title">-</h1>
      <div style="width:40px"></div>
    </header>

    <div class="nevi-container">
      <svg class="nevi" viewBox="0 0 70 80" xmlns="http://www.w3.org/2000/svg">
        <rect id="nevi-body" x="10" y="5" width="50" height="70" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="2.5"/>
        <line id="nevi-divider" x1="10" y1="30" x2="60" y2="30" stroke="#639922" stroke-width="2.5"/>
        <circle id="nevi-eye-left" cx="25" cy="45" r="3" fill="#173404"/>
        <circle id="nevi-eye-right" cx="45" cy="45" r="3" fill="#173404"/>
        <path id="nevi-mouth" d="M 25 56 Q 35 68 45 56" stroke="#173404" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      <p id="nevi-message"></p>
    </div>

    <div id="product-list" class="product-list"></div>
    <div id="empty-list" class="empty-state" style="display:none" data-i18n="empty"></div>
  </div>

  <!-- PANTALLA DETALL DE PRODUCTE -->
  <div id="screen-product" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="list" aria-label="Back">‹</button>
      <h1 data-i18n="product"></h1>
      <div style="width:40px"></div>
    </header>

    <div class="product-card">
      <p id="product-emoji" class="product-emoji">🥛</p>
      <p id="product-name" class="product-name">-</p>
      <p id="product-days" class="product-days">-</p>
    </div>

    <p class="section-label" data-i18n="whatToDo"></p>

    <div class="actions">
      <button class="action-btn action-consumed" data-action="consumed">
        <span class="action-icon">✓</span>
        <span data-i18n="consumed"></span>
      </button>
      <button class="action-btn action-trashed" data-action="trashed">
        <span class="action-icon">🗑</span>
        <span data-i18n="trashed"></span>
      </button>
      <button class="action-btn action-delete" data-action="deleted">
        <span class="action-icon">✕</span>
        <span data-i18n="deleteError"></span>
      </button>
    </div>
  </div>

  <!-- PANTALLA TRIAR COM AFEGIR -->
  <div id="screen-add-choice" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="home" aria-label="Back">‹</button>
      <h1 data-i18n="addProductTitle"></h1>
      <div style="width:40px"></div>
    </header>

    <div class="add-choices">
      <button class="big-choice" id="choice-scan">
        <span class="big-choice-emoji">📷</span>
        <span class="big-choice-text" data-i18n="scanBarcode"></span>
      </button>
      <button class="big-choice" id="choice-manual">
        <span class="big-choice-emoji">✍️</span>
        <span class="big-choice-text" data-i18n="manual"></span>
      </button>
    </div>
  </div>

  <!-- PANTALLA ESCÀNER -->
  <div id="screen-scan" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="add-choice" aria-label="Back">‹</button>
      <h1 data-i18n="scanning"></h1>
      <div style="width:40px"></div>
    </header>

    <div class="scanner-container">
      <div class="scanner-frame">
        <div id="scanner-video-container"></div>
      </div>
      <p class="scanner-hint" data-i18n="pointCamera"></p>
      <p id="scanner-status" class="scanner-status"></p>

      <div class="scanner-fallbacks">
        <button id="manual-code-btn" class="fallback-btn">
          <span class="fallback-emoji">⌨️</span>
          <span data-i18n="manualCode"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- PANTALLA INTRODUIR CODI A MÀ -->
  <div id="screen-manual-code" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="scan" aria-label="Back">‹</button>
      <h1 data-i18n="manualCode"></h1>
      <div style="width:40px"></div>
    </header>

    <p class="section-hint" data-i18n="manualCodeHint"></p>

    <div class="form-group">
      <label data-i18n="barcodeLabel" for="input-barcode"></label>
      <input type="text" id="input-barcode" inputmode="numeric" pattern="[0-9]*" maxlength="14" placeholder="8410014006288" autocomplete="off">
    </div>

    <button id="search-barcode-btn" class="primary-btn" data-i18n="searchProduct"></button>
  </div>

  <!-- PANTALLA AFEGIR PRODUCTE (manual o després d'escanejar) -->
  <div id="screen-add" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="add-choice" aria-label="Back">‹</button>
      <h1 data-i18n="addProductTitle"></h1>
      <div style="width:40px"></div>
    </header>

    <div id="scan-warning" class="scan-warning" style="display:none">
      <span class="scan-warning-icon">⚠️</span>
      <span data-i18n="scanWarning"></span>
    </div>

    <button id="popular-btn" class="popular-btn">
      <span style="font-size:22px">⭐</span>
      <span data-i18n="popularProducts"></span>
    </button>

    <div class="form-group">
      <label data-i18n="productName" for="input-name"></label>
      <input type="text" id="input-name" autocomplete="off">
    </div>

    <div class="form-group">
      <label data-i18n="location"></label>
      <div class="location-picker" id="location-picker"></div>
    </div>

    <div class="form-group">
      <label data-i18n="emoji"></label>
      <div class="emoji-picker" id="emoji-picker"></div>
    </div>

    <div class="form-group">
      <label data-i18n="expiryDate" for="input-date"></label>
      <input type="date" id="input-date">
      <div class="quick-dates">
        <button class="quick-date" data-days="3">+3</button>
        <button class="quick-date" data-days="7">+7</button>
        <button class="quick-date" data-days="14">+14</button>
        <button class="quick-date" data-days="30">+30</button>
      </div>
    </div>

    <button id="save-btn" class="primary-btn" data-i18n="save"></button>
  </div>

  <!-- PANTALLA UBICACIONS (gestió) -->
  <div id="screen-locations" class="screen">
    <header class="top-bar">
      <button class="back-btn" id="locations-back-btn" data-back="add" aria-label="Back">‹</button>
      <h1 data-i18n="locations"></h1>
      <div style="width:40px"></div>
    </header>
    <p class="section-hint" data-i18n="locationsHint"></p>
    <div id="locations-list" class="locations-list"></div>
    <button id="new-location-btn" class="primary-btn" data-i18n="newLocation"></button>
  </div>

  <!-- PANTALLA EDITAR UBICACIÓ -->
  <div id="screen-location-edit" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="locations" aria-label="Back">‹</button>
      <h1 id="loc-edit-title" data-i18n="editLocation"></h1>
      <div style="width:40px"></div>
    </header>

    <div style="text-align:center;font-size:64px;line-height:1;margin:10px 0 20px">
      <span id="loc-edit-emoji">📍</span>
    </div>

    <div class="form-group">
      <label data-i18n="locationName" for="loc-edit-name"></label>
      <input type="text" id="loc-edit-name" autocomplete="off">
    </div>

    <div class="form-group">
      <label data-i18n="emoji"></label>
      <div class="emoji-picker" id="loc-edit-emoji-picker"></div>
    </div>

    <div class="form-group">
      <label data-i18n="storageType"></label>
      <div class="storage-type-picker" id="storage-type-picker"></div>
      <p class="form-hint" data-i18n="storageTypeHint"></p>
    </div>

    <button id="save-location-btn" class="primary-btn" data-i18n="save"></button>
    <button id="loc-edit-delete" class="danger-btn" data-i18n="delete" style="display:none;margin-top:10px"></button>
  </div>

  <!-- PANTALLA PRODUCTES POPULARS -->
  <div id="screen-popular" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="add" aria-label="Back">‹</button>
      <h1 data-i18n="popularProducts"></h1>
      <div style="width:40px"></div>
    </header>
    <p class="section-hint" data-i18n="popularHint"></p>
    <div id="popular-list" class="popular-list"></div>
  </div>

  <!-- PANTALLA CONFIGURACIÓ -->
  <div id="screen-settings" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="home" aria-label="Back">‹</button>
      <h1 data-i18n="menu"></h1>
      <div style="width:40px"></div>
    </header>

    <div class="settings-cards">
      <!-- IDIOMA -->
      <button class="settings-card settings-card-language" id="settings-language">
        <div class="settings-card-icon">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="13" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
            <ellipse cx="16" cy="16" rx="6" ry="13" fill="none" stroke="#FFFFFF" stroke-width="2"/>
            <line x1="3" y1="16" x2="29" y2="16" stroke="#FFFFFF" stroke-width="2"/>
            <path d="M 6 10 Q 16 7 26 10" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
            <path d="M 6 22 Q 16 25 26 22" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
          </svg>
        </div>
        <div class="settings-card-info">
          <p class="settings-card-title" data-i18n="language"></p>
          <p class="settings-card-sub" id="language-status">-</p>
        </div>
        <span class="settings-card-arrow">›</span>
      </button>

      <!-- UBICACIONS -->
      <button class="settings-card settings-card-locations" id="settings-locations">
        <div class="settings-card-icon">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path d="M 16 4 C 11 4 7 8 7 13 C 7 19 16 28 16 28 C 16 28 25 19 25 13 C 25 8 21 4 16 4 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="0.5"/>
            <circle cx="16" cy="13" r="3.5" fill="#673AB7"/>
          </svg>
        </div>
        <div class="settings-card-info">
          <p class="settings-card-title" data-i18n="locations"></p>
          <p class="settings-card-sub" id="locations-count">-</p>
        </div>
        <span class="settings-card-arrow">›</span>
      </button>

      <!-- APARENÇA -->
      <button class="settings-card settings-card-theme" id="settings-theme">
        <div class="settings-card-icon">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="7" fill="#FFFFFF"/>
            <g stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round">
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="16" y1="26" x2="16" y2="30"/>
              <line x1="2" y1="16" x2="6" y2="16"/>
              <line x1="26" y1="16" x2="30" y2="16"/>
              <line x1="6" y1="6" x2="9" y2="9"/>
              <line x1="23" y1="23" x2="26" y2="26"/>
              <line x1="6" y1="26" x2="9" y2="23"/>
              <line x1="23" y1="9" x2="26" y2="6"/>
            </g>
          </svg>
        </div>
        <div class="settings-card-info">
          <p class="settings-card-title" data-i18n="appearance"></p>
          <p class="settings-card-sub" id="theme-status">-</p>
        </div>
        <span class="settings-card-arrow">›</span>
      </button>

      <!-- ESTADÍSTIQUES -->
      <button class="settings-card settings-card-stats" id="settings-stats">
        <div class="settings-card-icon">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="18" width="5" height="10" rx="1" fill="#FFFFFF"/>
            <rect x="13.5" y="12" width="5" height="16" rx="1" fill="#FFFFFF"/>
            <rect x="21" y="6" width="5" height="22" rx="1" fill="#FFFFFF"/>
            <path d="M 5 14 L 11 14 L 16 9 L 23 4" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
            <circle cx="23" cy="4" r="2" fill="#FFFFFF"/>
          </svg>
        </div>
        <div class="settings-card-info">
          <p class="settings-card-title" data-i18n="stats"></p>
          <p class="settings-card-sub" id="stats-sub" data-i18n="statsEmpty"></p>
        </div>
        <span class="settings-card-arrow">›</span>
      </button>

      <!-- NOTIFICACIONS -->
      <div class="settings-card settings-card-notifications settings-card-disabled">
        <div class="settings-card-icon">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path d="M 16 5 C 11 5 8 9 8 14 L 8 19 L 5 23 L 27 23 L 24 19 L 24 14 C 24 9 21 5 16 5 Z" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="0.5"/>
            <path d="M 13 25 C 13 27 14 28 16 28 C 18 28 19 27 19 25 Z" fill="#FFFFFF"/>
          </svg>
        </div>
        <div class="settings-card-info">
          <p class="settings-card-title" data-i18n="notifications"></p>
          <p class="settings-card-sub" data-i18n="comingSoon"></p>
        </div>
      </div>

      <!-- ESBORRAR TOT -->
      <button class="settings-card settings-card-reset" id="settings-reset">
        <div class="settings-card-icon">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <path d="M 8 9 L 24 9 L 23 26 C 23 27 22 28 21 28 L 11 28 C 10 28 9 27 9 26 Z" fill="#FFFFFF"/>
            <rect x="6" y="7" width="20" height="3" rx="1.5" fill="#FFFFFF"/>
            <rect x="13" y="3" width="6" height="4" rx="1" fill="#FFFFFF"/>
            <line x1="13" y1="13" x2="13" y2="24" stroke="#C62828" stroke-width="1.5"/>
            <line x1="16" y1="13" x2="16" y2="24" stroke="#C62828" stroke-width="1.5"/>
            <line x1="19" y1="13" x2="19" y2="24" stroke="#C62828" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="settings-card-info">
          <p class="settings-card-title" data-i18n="resetAll"></p>
          <p class="settings-card-sub" data-i18n="resetSub"></p>
        </div>
        <span class="settings-card-arrow">›</span>
      </button>
    </div>

    <p class="app-version">EatMeFirst · v2.0</p>
  </div>

  <!-- PANTALLA IDIOMES -->
  <div id="screen-language" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="settings" aria-label="Back">‹</button>
      <h1 data-i18n="language"></h1>
      <div style="width:40px"></div>
    </header>

    <div class="lang-list" id="lang-list"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
