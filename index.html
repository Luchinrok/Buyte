<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#639922">
  <title>BuyTe</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- PANTALLA PRINCIPAL: SELECTOR DE SECCIONS -->
  <!-- PANTALLA SELECTORA INICIAL -->
  <div id="screen-launcher" class="screen active">
    <header class="top-bar launcher-top-bar">
      <div class="top-info">
        <h1 class="launcher-title">BuyTe</h1>
        <p class="launcher-subtitle" data-i18n="launcherSubtitle"></p>
      </div>
      <button id="launcher-menu-btn" class="icon-btn icon-btn-fun" aria-label="Menú">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <g class="gear-spin">
            <path d="M 16 2 L 18 2 L 18.6 5.5 C 19.7 5.8 20.7 6.2 21.6 6.7 L 24.5 4.7 L 25.9 6.1 L 27.3 7.5 L 25.3 10.4 C 25.8 11.3 26.2 12.3 26.5 13.4 L 30 14 L 30 16 L 30 18 L 26.5 18.6 C 26.2 19.7 25.8 20.7 25.3 21.6 L 27.3 24.5 L 25.9 25.9 L 24.5 27.3 L 21.6 25.3 C 20.7 25.8 19.7 26.2 18.6 26.5 L 18 30 L 16 30 L 14 30 L 13.4 26.5 C 12.3 26.2 11.3 25.8 10.4 25.3 L 7.5 27.3 L 6.1 25.9 L 4.7 24.5 L 6.7 21.6 C 6.2 20.7 5.8 19.7 5.5 18.6 L 2 18 L 2 16 L 2 14 L 5.5 13.4 C 5.8 12.3 6.2 11.3 6.7 10.4 L 4.7 7.5 L 6.1 6.1 L 7.5 4.7 L 10.4 6.7 C 11.3 6.2 12.3 5.8 13.4 5.5 L 14 2 Z" fill="currentColor"/>
            <circle cx="16" cy="16" r="5" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
          </g>
        </svg>
      </button>
    </header>

    <div class="launcher-cards">
      <!-- LLISTA DE LA COMPRA -->
      <button class="launcher-card launcher-card-shopping" id="launcher-shopping">
        <div class="launcher-card-icon">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <!-- Carro de la compra -->
            <path d="M 12 20 L 20 20 L 26 50 L 60 50 L 66 28 L 24 28" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="30" cy="62" r="5" fill="#FFFFFF"/>
            <circle cx="56" cy="62" r="5" fill="#FFFFFF"/>
            <!-- Productes dins el carro -->
            <rect x="32" y="32" width="8" height="14" rx="1" fill="#FFE082"/>
            <rect x="42" y="34" width="7" height="12" rx="1" fill="#FFAB91"/>
            <circle cx="55" cy="40" r="5" fill="#A5D6A7"/>
            <!-- Etiqueta de preu -->
            <path d="M 50 14 L 70 14 L 74 22 L 70 30 L 50 30 Z" fill="#FFD54F" stroke="#FFFFFF" stroke-width="1.5"/>
            <circle cx="68" cy="22" r="1.5" fill="#FFFFFF"/>
          </svg>
        </div>
        <div class="launcher-card-text">
          <p class="launcher-card-title" data-i18n="shoppingListTitle"></p>
          <p class="launcher-card-desc" data-i18n="shoppingListDesc"></p>
        </div>
        <span class="launcher-card-arrow">›</span>
      </button>

      <!-- TRACKER (l'app original) -->
      <button class="launcher-card launcher-card-tracker" id="launcher-tracker">
        <div class="launcher-card-icon">
          <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
            <!-- Nevera amb porta -->
            <rect x="20" y="10" width="40" height="60" rx="5" fill="none" stroke="#FFFFFF" stroke-width="3"/>
            <line x1="20" y1="35" x2="60" y2="35" stroke="#FFFFFF" stroke-width="2.5"/>
            <!-- Maneta -->
            <rect x="55" y="20" width="2.5" height="8" rx="1" fill="#FFFFFF"/>
            <rect x="55" y="44" width="2.5" height="8" rx="1" fill="#FFFFFF"/>
            <!-- Productes a dins (top) -->
            <rect x="26" y="18" width="6" height="14" rx="1" fill="#FFE082"/>
            <circle cx="42" cy="25" r="5" fill="#EF9A9A"/>
            <rect x="50" y="20" width="5" height="12" rx="1" fill="#A5D6A7"/>
            <!-- Productes a dins (bottom) -->
            <circle cx="30" cy="48" r="4" fill="#FFAB91"/>
            <rect x="38" y="42" width="6" height="12" rx="1" fill="#90CAF9"/>
            <rect x="48" y="44" width="7" height="10" rx="1" fill="#CE93D8"/>
            <!-- Rellotge petit indicant temps -->
            <circle cx="63" cy="13" r="6" fill="#FFD54F" stroke="#FFFFFF" stroke-width="1.5"/>
            <line x1="63" y1="13" x2="63" y2="10" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="63" y1="13" x2="65" y2="14" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="launcher-card-text">
          <p class="launcher-card-title" data-i18n="trackerTitle"></p>
          <p class="launcher-card-desc" data-i18n="trackerDesc"></p>
        </div>
        <span class="launcher-card-arrow">›</span>
      </button>
    </div>

    <p class="launcher-bottom-hint" data-i18n="launcherHint"></p>
  </div>

  <div id="screen-home" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="launcher" aria-label="Back">‹</button>
      <div class="top-info">
        <h1 class="launcher-title">BuyTe</h1>
        <p id="top-summary">...</p>
      </div>
    </header>

    <div class="sections-grid">
      <button class="section-btn section-fridge" data-cat="fridge">
        <div class="section-icon">
          <!-- NEVERA: blau cel alegre amb productes frescos visibles -->
          <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <!-- Cos principal -->
            <rect x="14" y="6" width="72" height="118" rx="10" fill="#FFFFFF" stroke="#1976D2" stroke-width="3"/>
            <!-- Línia de separació -->
            <line x1="14" y1="44" x2="86" y2="44" stroke="#1976D2" stroke-width="2.5"/>
            <!-- Tirador superior -->
            <rect x="78" y="22" width="4" height="14" rx="2" fill="#1976D2"/>
            <!-- Tirador inferior -->
            <rect x="78" y="60" width="4" height="50" rx="2" fill="#1976D2"/>
            <!-- Llumeta verda (signe que funciona) -->
            <circle cx="22" cy="14" r="2.5" fill="#4CAF50">
              
            </circle>
            <!-- CONGELADOR DE DALT -->
            <rect x="22" y="20" width="50" height="18" rx="3" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
            <!-- Productes a la nevera (sota) -->
            <!-- Llet -->
            <rect x="22" y="52" width="14" height="18" rx="2" fill="#FFF" stroke="#1976D2" stroke-width="1"/>
            <rect x="24" y="56" width="10" height="3" fill="#1976D2"/>
            <!-- Iogurts -->
            <rect x="40" y="58" width="9" height="12" rx="1" fill="#FFB74D"/>
            <rect x="51" y="58" width="9" height="12" rx="1" fill="#F06292"/>
            <!-- Pomes -->
            <circle cx="68" cy="62" r="6" fill="#E53935"/>
            <path d="M 68 56 Q 70 53 72 56" stroke="#388E3C" stroke-width="1.5" fill="none"/>
            <!-- Verdures (sota tot) -->
            <rect x="22" y="80" width="48" height="14" rx="3" fill="#A5D6A7" stroke="#66BB6A" stroke-width="1"/>
            <circle cx="32" cy="87" r="3" fill="#43A047"/>
            <circle cx="42" cy="87" r="3" fill="#FF7043"/>
            <circle cx="52" cy="87" r="3" fill="#43A047"/>
            <circle cx="62" cy="87" r="3" fill="#FF7043"/>
            <!-- Calaixet inferior -->
            <rect x="22" y="100" width="48" height="14" rx="3" fill="#E1F5FE" stroke="#4FC3F7" stroke-width="1"/>
          </svg>
        </div>
        <div class="section-info">
          <p class="section-title" data-i18n="catFridge"></p>
          <p class="section-count" id="count-fridge">0</p>
        </div>
        <div class="section-badge" id="badge-fridge"></div>
      </button>

      <button class="section-btn section-freezer" data-cat="freezer">
        <div class="section-icon">
          <!-- CONGELADOR: turquesa gelat amb gel cobrint la porta -->
          <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <!-- Cos principal -->
            <rect x="14" y="6" width="72" height="118" rx="10" fill="#B3E5FC" stroke="#0277BD" stroke-width="3"/>
            <!-- Tapa de dalt (congelador horitzontal) -->
            <rect x="14" y="6" width="72" height="44" rx="10" fill="#81D4FA" stroke="#0277BD" stroke-width="3"/>
            <!-- Línia de separació de la tapa -->
            <line x1="14" y1="50" x2="86" y2="50" stroke="#0277BD" stroke-width="2.5"/>
            <!-- Nansa horitzontal -->
            <rect x="35" y="26" width="30" height="4" rx="2" fill="#01579B"/>
            <!-- Floquets de neu grans (decoratius) -->
            <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none">
              <!-- Floc 1 (gros, central) -->
              <g transform="translate(30 28)">
                <line x1="-7" y1="0" x2="7" y2="0"/>
                <line x1="0" y1="-7" x2="0" y2="7"/>
                <line x1="-5" y1="-5" x2="5" y2="5"/>
                <line x1="-5" y1="5" x2="5" y2="-5"/>
              </g>
              <!-- Floc 2 -->
              <g transform="translate(70 28)">
                <line x1="-7" y1="0" x2="7" y2="0"/>
                <line x1="0" y1="-7" x2="0" y2="7"/>
                <line x1="-5" y1="-5" x2="5" y2="5"/>
                <line x1="-5" y1="5" x2="5" y2="-5"/>
              </g>
            </g>
            <!-- Cristalls de gel (a la part baixa, dins) -->
            <g fill="#FFFFFF" opacity="0.7">
              <polygon points="22,60 26,68 30,60 26,52" />
              <polygon points="40,80 44,90 48,80 44,70" />
              <polygon points="58,72 62,80 66,72 62,64" />
              <polygon points="74,90 78,98 82,90 78,82" />
            </g>
            <!-- Glaçons al fons -->
            <rect x="22" y="100" width="14" height="14" rx="2" fill="#FFFFFF" opacity="0.9" stroke="#0288D1" stroke-width="0.5"/>
            <rect x="40" y="100" width="14" height="14" rx="2" fill="#FFFFFF" opacity="0.9" stroke="#0288D1" stroke-width="0.5"/>
            <rect x="58" y="100" width="14" height="14" rx="2" fill="#FFFFFF" opacity="0.9" stroke="#0288D1" stroke-width="0.5"/>
            <!-- Pampolons de neu de fons (subtils) -->
            <text x="20" y="118" font-size="6" fill="#FFFFFF" opacity="0.6">❄</text>
            <text x="80" y="118" font-size="6" fill="#FFFFFF" opacity="0.6">❄</text>
          </svg>
        </div>
        <div class="section-info">
          <p class="section-title" data-i18n="catFreezer"></p>
          <p class="section-count" id="count-freezer">0</p>
        </div>
        <div class="section-badge" id="badge-freezer"></div>
      </button>

      <button class="section-btn section-pantry" data-cat="pantry">
        <div class="section-icon">
          <!-- REBOST: armari de fusta càlid amb conserves variades -->
          <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <!-- Marc de l'armari (fusta fosca) -->
            <rect x="8" y="6" width="84" height="118" rx="4" fill="#5D4037" stroke="#3E2723" stroke-width="2"/>
            <!-- Interior (fusta clara) -->
            <rect x="14" y="12" width="72" height="106" rx="2" fill="#D7A86E" stroke="#8D6E63" stroke-width="1"/>
            <!-- Línies dels prestatges (fusta) -->
            <rect x="14" y="42" width="72" height="3" fill="#8D6E63"/>
            <rect x="14" y="74" width="72" height="3" fill="#8D6E63"/>
            <rect x="14" y="105" width="72" height="3" fill="#8D6E63"/>
            
            <!-- PRESTATGE 1: Llaunes i pots petits -->
            <rect x="18" y="22" width="10" height="20" rx="1" fill="#E53935"/>
            <rect x="19" y="24" width="8" height="3" fill="#FFFFFF"/>
            <rect x="30" y="24" width="9" height="18" rx="1" fill="#43A047"/>
            <rect x="31" y="26" width="7" height="2" fill="#FFFFFF"/>
            <rect x="41" y="20" width="11" height="22" rx="1" fill="#FB8C00"/>
            <rect x="42" y="22" width="9" height="3" fill="#FFFFFF"/>
            <rect x="54" y="24" width="9" height="18" rx="1" fill="#1E88E5"/>
            <rect x="55" y="26" width="7" height="2" fill="#FFFFFF"/>
            <rect x="65" y="22" width="10" height="20" rx="1" fill="#8E24AA"/>
            <rect x="66" y="24" width="8" height="3" fill="#FFFFFF"/>
            <rect x="77" y="24" width="8" height="18" rx="1" fill="#FDD835"/>
            
            <!-- PRESTATGE 2: Pots de conserva més grans -->
            <rect x="18" y="50" width="14" height="22" rx="2" fill="#FFFFFF" stroke="#666" stroke-width="0.5"/>
            <rect x="19" y="52" width="12" height="6" fill="#A1887F"/>
            <rect x="35" y="52" width="12" height="20" rx="1" fill="#26A69A"/>
            <rect x="36" y="54" width="10" height="3" fill="#FFFFFF"/>
            <rect x="50" y="48" width="14" height="24" rx="2" fill="#FFFFFF" stroke="#666" stroke-width="0.5"/>
            <rect x="51" y="50" width="12" height="6" fill="#FFB74D"/>
            <rect x="67" y="52" width="12" height="20" rx="1" fill="#EF5350"/>
            <rect x="68" y="54" width="10" height="3" fill="#FFFFFF"/>
            
            <!-- PRESTATGE 3: Capses de cereals/pasta -->
            <rect x="18" y="80" width="20" height="24" rx="2" fill="#FF9800"/>
            <rect x="20" y="83" width="16" height="3" fill="#FFFFFF"/>
            <rect x="22" y="89" width="12" height="2" fill="#FFFFFF" opacity="0.7"/>
            <rect x="40" y="84" width="16" height="20" rx="1" fill="#7B1FA2"/>
            <rect x="42" y="87" width="12" height="3" fill="#FFFFFF"/>
            <rect x="58" y="80" width="22" height="24" rx="2" fill="#5D4037"/>
            <rect x="60" y="83" width="18" height="3" fill="#FFCC80"/>
            <rect x="62" y="89" width="14" height="2" fill="#FFCC80" opacity="0.7"/>
            
            <!-- Pomos -->
            <circle cx="83" cy="64" r="2" fill="#FFC107"/>
            <circle cx="83" cy="95" r="2" fill="#FFC107"/>
          </svg>
        </div>
        <div class="section-info">
          <p class="section-title" data-i18n="catPantry"></p>
          <p class="section-count" id="count-pantry">0</p>
        </div>
        <div class="section-badge" id="badge-pantry"></div>
      </button>

      <button class="section-btn section-alerts" data-cat="alerts">
        <div class="section-icon section-icon-alert" id="bell-icon">
          <!-- ALERTES: campana vermella cridanera amb ones d'avís -->
          <svg viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg">
            <!-- Ones d'alarma (de fons, animades) -->
            <g stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5">
              <path d="M 8 50 Q 0 65 8 80">
                
              </path>
              <path d="M 92 50 Q 100 65 92 80">
                
              </path>
              <path d="M 4 40 Q -4 65 4 90">
                
              </path>
              <path d="M 96 40 Q 104 65 96 90">
                
              </path>
            </g>
            <!-- Botó al damunt de la campana -->
            <rect x="44" y="14" width="12" height="10" rx="2" fill="#FFEB3B" stroke="#F57F17" stroke-width="1.5"/>
            <!-- Cos de la campana (gran i visible) -->
            <path d="M 50 22 C 28 22 22 38 22 64 L 22 82 L 14 95 L 86 95 L 78 82 L 78 64 C 78 38 72 22 50 22 Z" fill="#FFEB3B" stroke="#F57F17" stroke-width="3" stroke-linejoin="round"/>
            <!-- Brillantor de la campana -->
            <ellipse cx="35" cy="42" rx="4" ry="10" fill="#FFFFFF" opacity="0.5"/>
            <!-- Símbol d'exclamació al centre -->
            <rect x="46" y="44" width="8" height="22" rx="2" fill="#D32F2F"/>
            <circle cx="50" cy="74" r="4" fill="#D32F2F"/>
            <!-- Batall (la pilota de baix) -->
            <path d="M 42 100 C 42 108 48 112 50 112 C 52 112 58 108 58 100 Z" fill="#F57F17" stroke="#D32F2F" stroke-width="2"/>
          </svg>
        </div>
        <div class="section-info">
          <p class="section-title" data-i18n="catAlerts"></p>
          <p class="section-count" id="count-alerts">0</p>
        </div>
        <div class="section-badge" id="badge-alerts"></div>
      </button>
    </div>

    <button id="btn-view-all" class="view-all-btn">
      <span style="font-size:18px;margin-right:8px">📋</span>
      <span data-i18n="viewAll"></span>
    </button>

    <button id="add-btn" class="primary-btn" data-i18n="addProduct"></button>
  </div>

  <!-- PANTALLA VEURE-HO TOT -->
  <div id="screen-view-all" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="home" aria-label="Back">‹</button>
      <h1 data-i18n="allProducts"></h1>
      <div style="width:40px"></div>
    </header>

    <div class="view-all-toolbar">
      <button class="popular-tool-btn" id="btn-sort-by-expiry">
        ⏰ <span data-i18n="sortByExpiry"></span>
      </button>
      <button class="popular-tool-btn" id="btn-sort-by-zone">
        📍 <span data-i18n="sortByZone"></span>
      </button>
    </div>

    <div id="view-all-list" class="view-all-list"></div>
  </div>

  <!-- PANTALLA NEVERA / CONGELADOR / REBOST (vista amb 4 prestatges) -->
  <div id="screen-section" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="home" aria-label="Back">‹</button>
      <h1 id="section-title">-</h1>
      <div class="section-nav">
        <button class="section-nav-btn" id="section-prev" aria-label="Prev">‹</button>
        <button class="section-nav-btn" id="section-next" aria-label="Next">›</button>
      </div>
    </header>

    <!-- Indicador de pàgines (3 punts) -->
    <div class="section-dots" id="section-dots"></div>

    <div class="fridge" id="section-fridge">
      <div class="shelf shelf-green" data-level="green">
        <div class="shelf-text">
          <p class="shelf-title" data-i18n="shelfGreen"></p>
          <p class="shelf-sub" id="shelf-sub-green"></p>
        </div>
        <div class="shelf-count">
          <span id="count-green">0</span>
          <span class="shelf-arrow">›</span>
        </div>
      </div>

      <div class="shelf shelf-yellow" data-level="yellow">
        <div class="shelf-text">
          <p class="shelf-title" data-i18n="shelfYellow"></p>
          <p class="shelf-sub" id="shelf-sub-yellow"></p>
        </div>
        <div class="shelf-count">
          <span id="count-yellow">0</span>
          <span class="shelf-arrow">›</span>
        </div>
      </div>

      <div class="shelf shelf-orange" data-level="orange">
        <div class="shelf-text">
          <p class="shelf-title" data-i18n="shelfOrange"></p>
          <p class="shelf-sub" id="shelf-sub-orange"></p>
        </div>
        <div class="shelf-count">
          <span id="count-orange">0</span>
          <span class="shelf-arrow">›</span>
        </div>
      </div>

      <div class="shelf shelf-red" data-level="red">
        <div class="shelf-text">
          <p class="shelf-title" data-i18n="shelfRed"></p>
          <p class="shelf-sub" id="shelf-sub-red"></p>
        </div>
        <div class="shelf-count">
          <span id="count-red">0</span>
          <span class="shelf-arrow">›</span>
        </div>
      </div>
    </div>
  </div>

  <!-- PANTALLA D'ALERTES -->
  <div id="screen-alerts" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="home" aria-label="Back">‹</button>
      <h1 data-i18n="catAlerts"></h1>
      <div style="width:40px"></div>
    </header>

    <p id="alerts-summary" class="section-hint"></p>

    <div id="alerts-list" class="product-list"></div>

    <div id="alerts-empty" class="empty-state" style="display:none">
      <p style="font-size:48px;margin-bottom:10px">🎉</p>
      <p data-i18n="alertsEmpty"></p>
    </div>
  </div>

  <!-- PANTALLA LLISTA DE PRODUCTES -->
  <div id="screen-list" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="section" aria-label="Back">‹</button>
      <h1 id="list-title">-</h1>
      <div style="width:40px"></div>
    </header>

    <div class="nevi-container">
      <svg class="nevi" viewBox="0 0 70 80" xmlns="http://www.w3.org/2000/svg">
        <rect id="nevi-body" x="10" y="5" width="50" height="70" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="2.5"/>
        <line id="nevi-divider" x1="10" y1="30" x2="60" y2="30" stroke="#639922" stroke-width="2.5"/>
        <circle id="nevi-eye-left" cx="25" cy="45" r="3" fill="#173404"/>
        <circle id="nevi-eye-right" cx="45" cy="45" r="3" fill="#173404"/>
        <path id="nevi-mouth" d="M 25 56 Q 35 68 45 56" stroke="#173404" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      <p id="nevi-message"></p>
    </div>

    <div id="product-list" class="product-list"></div>
    <div id="empty-list" class="empty-state" style="display:none" data-i18n="emptySection"></div>
  </div>

  <!-- PANTALLA DETALL DE PRODUCTE -->
  <div id="screen-product" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="list" aria-label="Back">‹</button>
      <h1 data-i18n="product"></h1>
      <div style="width:40px"></div>
    </header>

    <div class="product-card">
      <p id="product-emoji" class="product-emoji">🥛</p>
      <p id="product-name" class="product-name">-</p>
      <p id="product-days" class="product-days">-</p>

          <p class="stats-card-label" data-i18n="statsWastedLabel"></p>
        </div>
      </div>

      <div class="stats-rate-card">
        <p class="stats-rate-label" data-i18n="statsRateLabel"></p>
        <p class="stats-rate-value" id="stats-rate">-</p>
      </div>
    </div>
  </div>

  <!-- PANTALLA EL MEU IMPACTE -->
  <div id="screen-impact" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="settings" aria-label="Back">‹</button>
      <h1>📊 <span data-i18n="impactTitle"></span></h1>
      <div style="width:40px"></div>
    </header>

    <div id="impact-empty" class="impact-empty" style="display:none">
      <div class="celebrate-emoji">📊</div>
      <p class="celebrate-title" data-i18n="noImpactData"></p>
    </div>

    <div id="impact-body">
      <div class="impact-period-pills" id="impact-period-pills">
        <button class="impact-period-pill" data-period="week" data-i18n="thisWeek"></button>
        <button class="impact-period-pill active" data-period="month" data-i18n="thisMonth"></button>
        <button class="impact-period-pill" data-period="all" data-i18n="allTime"></button>
      </div>

      <!-- CARD 1: DINERS DEL MENJAR -->
      <div class="impact-card-v2 impact-card-money">
        <button class="impact-card-info-btn" data-info="money" aria-label="Info">ⓘ</button>
        <h3 class="impact-card-v2-title"><span class="impact-card-v2-emoji">💰</span> <span id="impact-money-title">-</span></h3>

        <div class="impact-money-row">
          <div class="impact-money-row-head">
            <span class="impact-money-row-label">✅ <span data-i18n="utilizedAmount"></span></span>
            <span class="impact-money-row-value impact-money-saved" id="impact-saved-num">0,00 €</span>
          </div>
          <div class="impact-card-progress-track"><div class="impact-progress-bar-green" id="impact-saved-bar" style="width:0%"></div></div>
        </div>

        <div class="impact-money-row">
          <div class="impact-money-row-head">
            <span class="impact-money-row-label">🗑️ <span data-i18n="wastedAmount"></span></span>
            <span class="impact-money-row-value impact-money-wasted" id="impact-wasted-num">0,00 €</span>
          </div>
          <div class="impact-card-progress-track"><div class="impact-progress-bar-red" id="impact-wasted-bar" style="width:0%"></div></div>
        </div>

        <p class="impact-money-util" id="impact-util-line">-</p>
      </div>

      <!-- CARD 2: IMPACTE AMBIENTAL -->
      <div class="impact-card-v2 impact-card-co2-v2">
        <button class="impact-card-info-btn" data-info="co2" aria-label="Info">ⓘ</button>
        <h3 class="impact-card-v2-title"><span class="impact-card-v2-emoji">🌍</span> <span data-i18n="environmentalImpact"></span></h3>

        <div class="impact-co2-row">
          <span class="impact-co2-row-emoji">🌱</span>
          <span class="impact-co2-row-value impact-co2-saved-val" id="impact-co2-saved">0 kg</span>
          <span class="impact-co2-row-label" data-i18n="co2Saved"></span>
        </div>
        <div class="impact-co2-row">
          <span class="impact-co2-row-emoji">💨</span>
          <span class="impact-co2-row-value impact-co2-wasted-val" id="impact-co2-wasted">0 kg</span>
          <span class="impact-co2-row-label" data-i18n="co2Wasted"></span>
        </div>

        <p class="impact-co2-equiv" id="impact-co2-equiv">-</p>
      </div>

      <!-- CARD 3: RATXA -->
      <div class="impact-card-v2 impact-card-streak-v2">
        <p class="impact-streak-emoji">🔥</p>
        <p class="impact-streak-num" id="impact-streak-num">0</p>
        <p class="impact-streak-label" data-i18n="streak"></p>
        <p class="impact-streak-record" id="impact-streak-record">-</p>
      </div>

      <div class="impact-section">
        <h3 class="impact-section-title">📈 <span data-i18n="last6Months"></span></h3>
        <div class="impact-chart" id="impact-chart"></div>
      </div>

      <div class="impact-section" id="impact-top-wasted-section">
        <h3 class="impact-section-title">⚠️ <span data-i18n="mostWasted"></span></h3>
        <div class="impact-top-wasted-list" id="impact-top-wasted-list"></div>
      </div>
    </div>
  </div>

  <!-- PANTALLA IDIOMES -->
  <div id="screen-language" class="screen">
    <header class="top-bar">
      <button class="back-btn" data-back="settings" aria-label="Back">‹</button>
      <h1 data-i18n="language"></h1>
      <div style="width:40px"></div>

    <div class="lang-list" id="lang-list"></div>
  </div>
